name: Publish to Scoop

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to publish (e.g. v1.11.0)
        required: true
        type: string
  release:
    types: [published, created]

concurrency:
  group: publish-scoop-${{ github.event.release.tag_name || inputs.tag }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve tag and version
        id: resolve
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${{ github.event.release.tag_name }}"
          fi

          if [[ -z "$TAG" ]]; then
            echo "Tag is empty" >&2
            exit 1
          fi

          VERSION="${TAG#v}"
          ZIP_NAME="wsl2-distro-manager-${TAG}.zip"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "zip_name=$ZIP_NAME" >> "$GITHUB_OUTPUT"

      - name: Check Scoop publish config
        id: scoop_config
        shell: bash
        env:
          SCOOP_GITHUB_TOKEN: ${{ secrets.SCOOP_GITHUB_TOKEN }}
          SCOOP_FORK: ${{ vars.SCOOP_FORK }}
        run: |
          if [ -z "$SCOOP_GITHUB_TOKEN" ] || [ -z "$SCOOP_FORK" ]; then
            echo "has_scoop_config=false" >> "$GITHUB_OUTPUT"
            echo "SCOOP_GITHUB_TOKEN or SCOOP_FORK missing. Skipping Scoop PR creation."
          else
            echo "has_scoop_config=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Download release ZIP asset
        if: steps.scoop_config.outputs.has_scoop_config == 'true'
        uses: dsaltares/fetch-gh-release-asset@master
        with:
          version: tags/${{ steps.resolve.outputs.tag }}
          file: ${{ steps.resolve.outputs.zip_name }}
          target: ${{ github.workspace }}/${{ steps.resolve.outputs.zip_name }}

      - name: Generate Scoop manifest
        if: steps.scoop_config.outputs.has_scoop_config == 'true'
        id: scoop_manifest
        shell: bash
        run: |
          ZIP_PATH="${{ github.workspace }}/${{ steps.resolve.outputs.zip_name }}"
          if [ ! -f "$ZIP_PATH" ]; then
            echo "Expected release zip not found: $ZIP_PATH" >&2
            exit 1
          fi

          ZIP_HASH=$(sha256sum "$ZIP_PATH" | awk '{print $1}')
          MANIFEST_DIR="${{ github.workspace }}/scoop-manifest"
          MANIFEST_PATH="$MANIFEST_DIR/wsl2-distro-manager.json"
          mkdir -p "$MANIFEST_DIR"

          cat > "$MANIFEST_PATH" <<EOF
          {
            "version": "${{ steps.resolve.outputs.version }}",
            "description": "GUI manager for Windows Subsystem for Linux distributions",
            "homepage": "https://github.com/bostrot/wsl2-distro-manager",
            "license": "GPL-3.0",
            "architecture": {
              "64bit": {
                "url": "https://github.com/bostrot/wsl2-distro-manager/releases/download/${{ steps.resolve.outputs.tag }}/wsl2-distro-manager-${{ steps.resolve.outputs.tag }}.zip",
                "hash": "$ZIP_HASH"
              }
            },
            "bin": ["wsl2distromanager.exe"],
            "shortcuts": [["wsl2distromanager.exe", "WSL2 Distro Manager"]],
            "checkver": {
              "github": "https://github.com/bostrot/wsl2-distro-manager"
            },
            "autoupdate": {
              "architecture": {
                "64bit": {
                  "url": "https://github.com/bostrot/wsl2-distro-manager/releases/download/v\$version/wsl2-distro-manager-v\$version.zip"
                }
              }
            }
          }
          EOF

          echo "manifest_path=$MANIFEST_PATH" >> "$GITHUB_OUTPUT"

      - name: Upload Scoop manifest artifact
        if: steps.scoop_config.outputs.has_scoop_config == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: scoop-manifest
          path: ${{ steps.scoop_manifest.outputs.manifest_path }}
          if-no-files-found: error
          retention-days: 30

      - name: Checkout ScoopInstaller/Extras
        if: steps.scoop_config.outputs.has_scoop_config == 'true'
        uses: actions/checkout@v4
        with:
          repository: ScoopInstaller/Extras
          ref: master
          path: scoop-extras

      - name: Copy Scoop manifest to Extras bucket
        if: steps.scoop_config.outputs.has_scoop_config == 'true'
        shell: bash
        run: |
          cp "${{ steps.scoop_manifest.outputs.manifest_path }}" "scoop-extras/bucket/wsl2-distro-manager.json"

      - name: Create Scoop Extras pull request
        if: steps.scoop_config.outputs.has_scoop_config == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.SCOOP_GITHUB_TOKEN }}
          path: scoop-extras
          commit-message: "scoop: update wsl2-distro-manager to ${{ steps.resolve.outputs.tag }}"
          branch: scoop-wsl2-distro-manager-${{ steps.resolve.outputs.version }}
          delete-branch: true
          push-to-fork: ${{ vars.SCOOP_FORK }}
          title: "wsl2-distro-manager: Update to version ${{ steps.resolve.outputs.version }}"
          body: |
            Automated Scoop manifest update for `wsl2-distro-manager`.

            - Version: `${{ steps.resolve.outputs.version }}`
            - Source: GitHub release `${{ steps.resolve.outputs.tag }}`
          base: master
          add-paths: |
            bucket/wsl2-distro-manager.json
