name: Releaser

on:
  workflow_dispatch:
  push:
    branches:
      - '*'
    paths:
      - 'lib/**/*'
      - 'assets/**/*'
      - 'windows/**/*'
      - 'installer/**/*'
      - 'LICENSE'
      - 'pubspec.yaml'

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          clean: true
          persist-credentials: true
          set-safe-directory: true
      # get version from pubspec.yaml and check if release already exists
      - name: Get version
        id: get_version
        run: |
          $pubspecRaw = Get-Content pubspec.yaml -Raw
          $versionMatch = [regex]::Match($pubspecRaw, 'version:\s*([^\s#]+)')
          if (-not $versionMatch.Success) {
            throw "Could not parse version from pubspec.yaml"
          }
          $wsl2_manager_version = $versionMatch.Groups[1].Value
          # Make web REST call to check if release already exists
          Try {
            $result = $(Invoke-RestMethod -Uri https://api.github.com/repos/bostrot/wsl2-distro-manager/releases/tags/v$wsl2_manager_version)
          } Catch {
            $result = $false
          }
          if ($result) {
            Write-Output "Release v$wsl2_manager_version already exists."
            "exists=true" >> $env:GITHUB_OUTPUT
          } else {
            "exists=false" >> $env:GITHUB_OUTPUT
          }
          "version=$wsl2_manager_version" >> $env:GITHUB_OUTPUT

      # Setup & build
      - name: Replace version in constants.dart
        run: |
          (Get-Content .\lib\components\constants.dart) -replace('currentVersion.*', 'currentVersion = "${{ steps.get_version.outputs.version }}";') | Set-Content .\lib\components\constants.dart
      - name: Replace version in pubspec.yaml for msix
        run: |
          (Get-Content .\pubspec.yaml) -replace('msix_version: (.*)', 'msix_version: ${{ steps.get_version.outputs.version }}.0') | Set-Content .\pubspec.yaml
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - run: flutter config --enable-windows-desktop
      - run: flutter build windows
      - run: dart run msix:create
      - name: Install Inno Setup
        shell: pwsh
        run: |
          $uninstallPaths = @(
            'HKLM:\Software\Microsoft\Windows\CurrentVersion\Uninstall\*',
            'HKLM:\Software\WOW6432Node\Microsoft\Windows\CurrentVersion\Uninstall\*',
            'HKCU:\Software\Microsoft\Windows\CurrentVersion\Uninstall\*'
          )
          $installed = Get-ItemProperty -Path $uninstallPaths -ErrorAction SilentlyContinue |
            Where-Object {
              $_.Publisher -eq 'JRSoftware' -and $_.DisplayName -like 'Inno Setup*'
            } |
            Select-Object -First 1
          if (-not $installed) {
            winget install --id JRSoftware.InnoSetup -e -s winget --accept-source-agreements --accept-package-agreements --disable-interactivity
          } else {
            Write-Host "Inno Setup already installed."
          }
      - name: Build installer (Inno Setup)
        shell: pwsh
        run: |
          .\installer\build-installer.ps1

      # Start of modification: Always upload artifact for every build
      - name: Prepare build artifact
        if: always()
        shell: pwsh
        run: |
          $buildDir = "build/windows/x64/runner/Release"
          $destZip = "wsl2-distro-manager-build.zip"
          
          if (Test-Path $buildDir) {
            Write-Host "Build directory found at $buildDir"

            # Create array of files to zip to handle complex path matching better
            $filesToZip = Get-ChildItem -Path $buildDir
            
            if (Test-Path $destZip) { Remove-Item $destZip -Force }
            
            Compress-Archive -Path $filesToZip.FullName -DestinationPath $destZip -Force
            
            if (Test-Path $destZip) {
               Write-Host "Zip created successfully at $destZip"
               Get-Item $destZip
            } else {
               Write-Error "Zip creation failed!"
            }
          } else {
            Write-Error "Build directory NOT found at $buildDir"
            Get-ChildItem -Recurse build -ErrorAction SilentlyContinue
          }

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: wsl2-distro-manager-build
          path: wsl2-distro-manager-build.zip
          retention-days: 5
          if-no-files-found: warn

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: wsl2-distro-manager-setup
          path: .\installer\wsl2-distro-manager-setup.exe
          retention-days: 5
          if-no-files-found: error
      # End of modification

      # Create nightly release
      - name: Create zip
        run: |
          # Use copy instead of move to avoid conflict
          Copy-Item ".\build\windows\x64\runner\Release\wsl2distromanager.msix" ".\wsl2-distro-manager-v${{ steps.get_version.outputs.version }}-nightly.msix" -Force
          Copy-Item ".\installer\wsl2-distro-manager-setup.exe" ".\wsl2-distro-manager-v${{ steps.get_version.outputs.version }}-nightly-setup.exe" -Force

          Compress-Archive -Path ./build/windows/x64/runner/Release/* -DestinationPath ".\wsl2-distro-manager-v${{ steps.get_version.outputs.version }}-nightly.zip" -Force

      - uses: actions/upload-artifact@v4
        name: Create nightly release (ZIP)
        with:
          name: wsl2-distro-manager-nightly-archive
          path: ./wsl2-distro-manager-v${{ steps.get_version.outputs.version }}-nightly.zip
          if-no-files-found: error
          retention-days: 30
          compression-level: 6
          overwrite: true

      - uses: actions/upload-artifact@v4
        name: Create nightly release (MSIX)
        with:
          name: wsl2-distro-manager-nightly-msix
          path: ./wsl2-distro-manager-v${{ steps.get_version.outputs.version }}-nightly.msix
          if-no-files-found: error
          retention-days: 30
          compression-level: 6
          overwrite: true

      - uses: actions/upload-artifact@v4
        name: Create nightly release (Setup EXE)
        with:
          name: wsl2-distro-manager-nightly-setup
          path: ./wsl2-distro-manager-v${{ steps.get_version.outputs.version }}-nightly-setup.exe
          if-no-files-found: error
          retention-days: 30
          compression-level: 6
          overwrite: true

      # Create full release with tag (only if branch is main)
      - name: Create release
        if: ${{ steps.get_version.outputs.exists == 'false' && github.ref == 'refs/heads/main' }}
        run: |
          Move-Item .\build\windows\x64\runner\Release\wsl2distromanager.msix .\wsl2-distro-manager-v${{ steps.get_version.outputs.version }}-unsigned.msix
          Copy-Item .\installer\wsl2-distro-manager-setup.exe .\wsl2-distro-manager-v${{ steps.get_version.outputs.version }}-setup.exe
          Compress-Archive -Path ./build/windows/x64/runner/Release/* -DestinationPath .\wsl2-distro-manager-v${{ steps.get_version.outputs.version }}.zip
          gh release create v${{ steps.get_version.outputs.version }} .\wsl2-distro-manager-v${{ steps.get_version.outputs.version }}.zip .\wsl2-distro-manager-v${{ steps.get_version.outputs.version }}-unsigned.msix .\wsl2-distro-manager-v${{ steps.get_version.outputs.version }}-setup.exe --generate-notes --notes "This is an automated release."
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Check WinGet token
        id: winget_token
        shell: pwsh
        env:
          WINGET_TOKEN: ${{ secrets.WINGET_TOKEN }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:WINGET_TOKEN)) {
            "has_token=false" >> $env:GITHUB_OUTPUT
            Write-Host "WINGET_TOKEN is not set. Skipping WinGet publish step."
          } else {
            "has_token=true" >> $env:GITHUB_OUTPUT
          }

      - name: Publish to WinGet
        if: steps.get_version.outputs.exists == 'false' && github.ref == 'refs/heads/main' && steps.winget_token.outputs.has_token == 'true'
        uses: vedantmgoyal9/winget-releaser@v2
        with:
          identifier: Bostrot.WSLManager
          version: ${{ steps.get_version.outputs.version }}.0
          release-tag: v${{ steps.get_version.outputs.version }}
          installers-regex: 'wsl2-distro-manager-v.*-setup\.exe$'
          token: ${{ secrets.WINGET_TOKEN }}
      
